name: Validate
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - changeset-release/main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24, bun]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - uses: oven-sh/setup-bun@v2
        name: Install Bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24, bun]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - uses: oven-sh/setup-bun@v2
        name: Install Bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - uses: oven-sh/setup-bun@v2
        name: Install Bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Check linting and formatting
        run: bun run check

  types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        name: Install Bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run typecheck
